<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title> الكتب - IoT Web</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root{
      /* Updated Color Palette based on the image */
      --bg-dark:#050710; /* Darker background from image */
      --bg-medium:#0a0e1a;
      --card-bg:#0d1b2a; /* Darker card background */
      --card-hover:#131a2b;
      --text-primary:#e8f0f8;
      --text-secondary:#9ca3af;
      --accent:#06b6d4; /* Cyan accent from image */
      --accent-hover:#0891b2;
      --border:rgba(255,255,255,0.08);
      --shadow:0 10px 40px -10px rgba(0,0,0,0.5);
      --glow: 0 0 20px rgba(6, 182, 212, 0.2);
    }
    
    * { box-sizing:border-box; margin:0; padding:0; outline: none; }
    
    body {
      font-family:'Almarai', sans-serif;
      background: linear-gradient(180deg, var(--bg-dark) 0%, #070b14 100%);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
      transition: font-size 0.3s ease; /* Smooth transition for font size change */
    }

    /* Large Text Mode Class */
    body.large-text {
        font-size: 1.2rem;
    }
    body.large-text h1 { font-size: 3.5rem; }
    body.large-text .subtitle { font-size: 1.3rem; }
    body.large-text .nav-link, 
    body.large-text .category-btn { font-size: 16px; }
    body.large-text .book-title { font-size: 22px; }
    body.large-text .book-description,
    body.large-text .book-author,
    body.large-text .read-more-btn { font-size: 15px; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 24px;
    }
    
    /* --- HEADER SECTION --- */
    header {
      text-align: center;
      margin-bottom: 50px;
      position: relative;
    }
    
    h1 {
      font-size: 3rem;
      font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 12px;
      position: relative;
      display: inline-block;
    }
    
    h1::after {
        content: '';
        display: block;
        width: 60px;
        height: 4px;
        background: var(--accent);
        border-radius: 2px;
        margin: 10px auto 0;
    }
    
    .subtitle {
      color: var(--text-secondary);
      font-size: 1.1rem;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    /* --- FLOATING NAV DOCK & TOOLS --- */
    .header-tools {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 20px;
        margin-bottom: 50px;
        position: relative;
    }

    .nav-dock {
      background: rgba(255, 255, 255, 0.03);
      padding: 8px;
      border-radius: 100px;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex;
      gap: 5px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    
    .nav-link {
      padding: 12px 28px;
      border-radius: 100px;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .nav-link:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.05);
    }
    
    .nav-link.current {
      background: var(--accent);
      color: #fff;
      box-shadow: var(--glow);
    }

    /* Text Size Button */
    .text-size-btn {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border);
        color: var(--accent);
        padding: 12px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
    }

    .text-size-btn:hover {
        background: var(--accent);
        color: #fff;
        box-shadow: var(--glow);
    }
    
    /* --- SEARCH BAR --- */
    .search-container {
      margin-bottom: 40px;
      display: flex;
      justify-content: center;
    }

    .search-box {
      position: relative;
      width: 100%;
      max-width: 600px;
    }

    .search-box i {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 1.2rem;
      pointer-events: none;
    }

    input[type=text] {
      width: 100%;
      padding: 18px 60px 18px 24px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(19, 26, 43, 0.6);
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      transition: all 0.3s ease;
    }
    
    input[type=text]:focus {
      background: var(--card-bg);
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(6, 182, 212, 0.1);
      transform: translateY(-2px);
    }
    
    /* --- CATEGORY PILLS --- */
    .categories-scroll {
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 30px;
      text-align: center;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .categories-scroll::-webkit-scrollbar { display: none; }

    .categories-wrapper {
      display: inline-flex;
      gap: 10px;
      padding: 0 10px;
    }
    
    .category-btn {
      padding: 10px 24px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
      white-space: nowrap;
    }
    
    .category-btn:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .category-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: var(--glow);
    }
    
    /* --- BOOKS GRID --- */
    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
    }
    
    /* --- CARD DESIGN --- */
    .book-card {
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid var(--border);
      padding: 24px;
      transition: all 0.4s ease;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    
    .book-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
      border-color: rgba(6, 182, 212, 0.3);
      background: var(--card-hover);
    }

    .book-meta {
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 12px;
    }

    .book-category {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: block;
    }

    .book-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 8px;
    }
    
    .book-author {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    /* Updated Description Styles */
    .book-description {
      font-size: 13px;
      color: #7b8595;
      line-height: 1.6;
      margin: 16px 0 8px 0;
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .book-description.expanded {
        -webkit-line-clamp: unset;
        display: block;
    }

    /* Read More Toggle Button */
    .read-more-btn {
        background: transparent;
        border: none;
        color: var(--accent);
        font-size: 12px;
        cursor: pointer;
        padding: 0;
        margin-bottom: 20px;
        text-align: right;
        font-weight: 600;
        width: fit-content;
    }
    
    .read-more-btn:hover {
        text-decoration: underline;
        color: var(--text-primary);
    }
    
    /* Full width action button */
    .action-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: var(--text-primary);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: auto;
    }
    
    .action-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    /* --- STATES --- */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      grid-column: 1 / -1;
      background: rgba(255,255,255,0.02);
      border-radius: 20px;
      border: 1px dashed var(--border);
    }
    
    .empty-state h3 {
      color: var(--text-primary);
      margin-top: 15px;
      margin-bottom: 5px;
    }
    
    .empty-state p { color: var(--text-secondary); }

    @media (max-width: 768px) {
      .container { padding: 20px 16px; }
      h1 { font-size: 2.2rem; }
      .header-tools { flex-direction: column; gap: 15px; }
      .nav-dock { width: 100%; justify-content: space-around; }
      .nav-link { padding: 10px 15px; font-size: 13px; }
      .books-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>المكتبة</h1>
      <p class="subtitle">تصفح الكتب والمراجع في مجال إنترنت الأشياء والبرمجة</p>
      
      <div class="header-tools">
        <nav class="nav-dock">
          <a href="index.html" class="nav-link">الرئيسية</a>
          <a href="courses.html" class="nav-link">الدورات</a>
          <a href="articles.html" class="nav-link">المقالات</a>
        </nav>
        <button class="text-size-btn" id="textSizeBtn" title="تغيير حجم الخط">
            <i class="fas fa-text-height"></i>
        </button>
      </div>
    </header>

    <div class="search-container">
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" placeholder="ماذا تريد أن تتعلم اليوم؟" id="searchInput">
      </div>
    </div>

    <div class="categories-scroll">
      <div class="categories-wrapper">
        <button class="category-btn active" data-category="all">الكل</button>
        <button class="category-btn" data-category="iot">إنترنت الأشياء</button>
        <button class="category-btn" data-category="programming">البرمجة</button>
        <button class="category-btn" data-category="ai">الذكاء الاصطناعي</button>
        <button class="category-btn" data-category="electronics">الإلكترونيات</button>
        <button class="category-btn" data-category="networking">الشبكات</button>
        <button class="category-btn" data-category="security">الأمان السيبراني</button>
      </div>
    </div>

    <div class="books-grid" id="booksGrid">
      </div>
  </div>

  <script>
const BIN_ID = '69cacbb936566621a8627d9e'; // Replace this with your JSONBin ID
const API_KEY = '$2a$10$aevoF.CcdIuKdPw/XZPfNORtdkW5v3FLqx5FaepeHo1k2TGrQSPdy'; // Replace this with your API Key (delete if the bin is public)

// Variables to manage the application's data state
let rawData = {};        // Stores the original fetched data from the API
let allBooks = [];       // Stores all books mapped into a single flat array
let displayedBooks = []; // Stores the books currently visible on the screen
let currentCategory = 'all'; // Tracks the currently selected category filter

// Select the text size toggle button and add a click event listener
const textSizeBtn = document.getElementById('textSizeBtn');
if (textSizeBtn) {
    textSizeBtn.addEventListener('click', () => {
        // Toggles the 'large-text' CSS class on the body element to increase font size
        document.body.classList.toggle('large-text');
    });
}

// Main initialization function to fetch data from JSONBin
async function init() {
  try {
    // Make an asynchronous GET request to the JSONBin API
    const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
      method: 'GET',
      headers: {
        'X-Master-Key': API_KEY // Remove this header if your JSONBin is completely public
      }
    });

    // Check if the HTTP response is OK (status 200-299)
    if (!response.ok) throw new Error("Failed to load data from JSONBin");
    
    // Parse the JSON response body
    const data = await response.json();
    
    // JSONBin v3 stores your actual JSON data inside a 'record' object property
    rawData = data.record; 
    
    // Process the raw data and set up user interactions
    processData();
    setupEventListeners();
  } catch (error) {
    console.error(error);
    // Display an error message on the screen if fetching fails
    const booksGrid = document.getElementById('booksGrid');
    if (booksGrid) {
        booksGrid.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-exclamation-circle fa-3x" style="color:var(--text-secondary)"></i>
            <h3>Connection Error</h3>
            <p>Please check your JSONBin ID and API Key.</p>
          </div>
        `;
    }
  }
}

// Flattens the categorized JSON object into a single, manageable array of books
function processData() {
  allBooks = [];
  // Loop through each category key and its corresponding array of books
  for (const [category, books] of Object.entries(rawData)) {
    if (Array.isArray(books)) {
      books.forEach(book => {
        book.category = category; // Assign the parent category name to each individual book object
        allBooks.push(book);      // Add the book to our master array
      });
    }
  }
  // Display all books initially by applying the default 'all' filter
  filterByCategory(currentCategory);
}

// Generates and injects the HTML structure for the books into the grid container
function renderBooks() {
  const booksGrid = document.getElementById('booksGrid');
  if (!booksGrid) return; // Exit if the container doesn't exist in the DOM
  
  // Display a fallback message if there are no books to show (e.g., empty search results)
  if (displayedBooks.length === 0) {
    booksGrid.innerHTML = `
      <div class="empty-state">
        <i class="fas fa-search fa-3x" style="color:var(--text-secondary)"></i>
        <h3>No Results Found</h3>
        <p>No books match your current search.</p>
      </div>
    `;
    return;
  }

  // Map over the displayedBooks array to create HTML strings for each card, then join them
  booksGrid.innerHTML = displayedBooks.map((book, index) => `
    <div class="book-card" style="animation: fadeInUp 0.5s ease forwards; animation-delay: ${index * 0.05}s; opacity: 0; transform: translateY(20px);">
      
      <div class="book-meta">
        <span class="book-category">${getCategoryName(book.category)}</span>
        <h3 class="book-title">${book.title}</h3>
        <p class="book-author"><i class="far fa-user"></i> ${book.author}</p>
      </div>
      
      <p class="book-description" id="desc-${index}">${book.description}</p>
      
      <button class="read-more-btn" onclick="toggleDescription('desc-${index}', this)">
        قراءة المزيد
      </button>
      
      <button class="action-btn" onclick="window.open('${book.downloadLink}', '_blank')">
        <span>تحميل الكتاب</span>
        <i class="fas fa-download"></i>
      </button>
    </div>
  `).join('');
}

// Toggles the expansion of the book description text visually
window.toggleDescription = function(elementId, btn) {
    const desc = document.getElementById(elementId);
    if (!desc) return;
    
    // If the text is currently expanded, collapse it and change button text
    if (desc.classList.contains('expanded')) {
        desc.classList.remove('expanded');
        btn.innerHTML = 'قراءة المزيد'; // "Read More" in Arabic
    } else {
        // If collapsed, expand it and change button text
        desc.classList.add('expanded');
        btn.innerHTML = 'عرض أقل'; // "Show Less" in Arabic
    }
}

// Dynamically inject CSS keyframes for the card fade-in animation to avoid cluttering the main HTML
if (!document.getElementById('dynamic-styles')) {
    const styleSheet = document.createElement("style");
    styleSheet.id = 'dynamic-styles';
    styleSheet.innerText = `
      @keyframes fadeInUp {
        to { opacity: 1; transform: translateY(0); }
      }
    `;
    document.head.appendChild(styleSheet);
}

// Translates technical category keys into readable Arabic labels for the UI
function getCategoryName(category) {
  const categories = {
    'iot': 'إنترنت الأشياء',
    'programming': 'البرمجة',
    'ai': 'الذكاء الاصطناعي',
    'electronics': 'الإلكترونيات',
    'networking': 'الشبكات',
    'security': 'الأمان السيبراني'
  };
  return categories[category] || category; // Fallback to the raw key if no translation exists
}

// Filters the displayed books based on the selected category button
function filterByCategory(category) {
  currentCategory = category;
  
  // Loop through all category buttons to update their active visual state
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.classList.remove('active');
    // Add the 'active' class only to the button that matches the clicked category
    if(btn.dataset.category === category) btn.classList.add('active');
  });
  
  // Filter the main array based on the category
  if (category === 'all') {
    displayedBooks = [...allBooks]; // Create a shallow copy of all books
  } else {
    displayedBooks = allBooks.filter(book => book.category === category);
  }
  
  // Re-render the UI with the newly filtered list
  renderBooks();
}

// Filters books based on a user's typed search query
function searchBooks(query) {
  const lowerQuery = query.toLowerCase(); // Convert query to lowercase for case-insensitive matching
  
  // Keep only books where the title, author, or description contains the search string
  displayedBooks = allBooks.filter(book => 
    book.title.toLowerCase().includes(lowerQuery) ||
    book.author.toLowerCase().includes(lowerQuery) ||
    book.description.toLowerCase().includes(lowerQuery)
  );
  
  // Automatically switch the active category button back to "All" when a search is active
  if (query.length > 0) {
      document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
      const allBtn = document.querySelector('[data-category="all"]');
      if (allBtn) allBtn.classList.add('active');
  }

  // Re-render the UI with the search results
  renderBooks();
}

// Attaches necessary event listeners to interactive DOM elements
function setupEventListeners() {
  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
      // Listen for every keystroke in the search bar
      searchInput.addEventListener('input', (e) => {
        // If the search bar is cleared, reset to showing all books
        if (e.target.value.trim() === '') {
          filterByCategory('all');
        } else {
          // Otherwise, perform the search
          searchBooks(e.target.value);
        }
      });
  }

  // Attach a click event listener to every category filter button
  document.querySelectorAll('.category-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      // Filter the grid based on the 'data-category' attribute of the clicked button
      filterByCategory(btn.dataset.category);
    });
  });
}

// Kick off the script by running the init function once the HTML document is fully loaded
document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
